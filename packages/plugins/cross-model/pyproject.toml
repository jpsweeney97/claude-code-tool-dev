[project]
name = "cross-model-plugin"
version = "3.0.0"
description = "Cross-model consultation plugin for Claude Code"
requires-python = ">=3.11"
dependencies = ["pyyaml>=6.0", "mcp>=1.9.0"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.8",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
norecursedirs = ["context-injection"]
