[project]
name = "context-injection"
version = "0.1.0"
description = "Context injection MCP server for the codex-dialogue agent"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
