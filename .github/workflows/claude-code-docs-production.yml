name: Claude Code Docs Production Gates

on:
  pull_request:
    paths:
      - "package-lock.json"
      - "package.json"
      - "packages/mcp-servers/claude-code-docs/**"
      - ".github/workflows/claude-code-docs-production.yml"
  push:
    branches:
      - main
    paths:
      - "package-lock.json"
      - "package.json"
      - "packages/mcp-servers/claude-code-docs/**"
      - ".github/workflows/claude-code-docs-production.yml"
  workflow_dispatch:

jobs:
  production-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Unit Test
        run: npm run test --workspace @claude-tools/claude-code-docs

      - name: Typecheck
        run: npm run typecheck --workspace @claude-tools/claude-code-docs

      - name: Build
        run: npm run build --workspace @claude-tools/claude-code-docs

      - name: Audit (High/Critical Gate)
        run: npm audit --omit=dev --audit-level=high --workspace @claude-tools/claude-code-docs

      - name: Startup Smoke (REQUIRE_INDEX_ON_STARTUP=true)
        run: npm run smoke:startup --workspace @claude-tools/claude-code-docs

      - name: Refresh Smoke (REFRESH_INTERVAL_MS=60000)
        run: npm run smoke:refresh --workspace @claude-tools/claude-code-docs
