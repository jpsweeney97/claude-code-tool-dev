shared_contract_version: 1
readme: README.md

authorities:
  foundation:
    description: Composability model, scope boundaries, consumer class definitions, cross-cutting architectural and behavioral invariants (standalone coherence, consumer class semantics).
    default_claims: [architecture_rule, behavior_contract]

  decisions:
    description: Locked design decisions (D1-D5) with alternatives considered and tradeoffs accepted.
    default_claims: [decision_record]

  capsule-contract:
    description: Capsule schemas, sentinels, consumer class assignments, and wire format for inter-skill data exchange.
    default_claims: [interface_contract]

  pipeline:
    description: Adaptive --plan behavior, two-stage admission with adapter pattern, decomposition modes, tautology filter, pipeline threading.
    default_claims: [behavior_contract]

  routing:
    description: Routing classification, material-delta gating tiers, affected-surface validity matrix, guardrails, thread freshness, feedback persistence.
    default_claims: [behavior_contract, enforcement_mechanism]

  lineage:
    description: Artifact identity system — three identity keys, ID format, DAG structure, discovery algorithms, staleness detection.
    default_claims: [interface_contract, behavior_contract]

  delivery-plan:
    description: Implementation plan per skill, open items, deferred work.
    default_claims: [implementation_plan]

  delivery-verification:
    description: Verification paths for normative claims, test instruments, deferred verification.
    default_claims: [verification_strategy]

  supporting:
    description: Navigation, reading order, and reference material.
    default_claims: []

precedence:
  normative_first: true
  claim_precedence:
    behavior_contract: [routing, pipeline, lineage, foundation]
    # Foundation's behavior_contract claims define cross-cutting invariants
    # (consumer classes, capsule externalization) that downstream authorities
    # must not contradict. Foundation ranks last in precedence for conflict
    # resolution, but its behavioral invariants are architectural constraints
    # referenced by all three behavior authorities — contradictions indicate
    # a spec defect, not a precedence override.
    interface_contract: [capsule-contract, lineage]
  # decisions ranked 2nd (after foundation) in fallback_authority_order because locked
  # design decisions constrain behavior. Conflicts are resolved via the fallback path
  # — decisions does not appear in claim_precedence and cannot override via that route.
  fallback_authority_order: [foundation, decisions, capsule-contract, routing, pipeline, lineage, delivery-plan, delivery-verification, supporting]
  unresolved: ambiguity_finding
  # Cross-family disambiguation: behavior_contract claims govern runtime pipeline
  # state (what happens during processing). interface_contract claims govern the
  # emitted wire format (what appears in capsule schemas). When these appear to
  # conflict, check whether one governs pre-emission state and the other
  # post-emission format — they may describe different pipeline stages.

# External authorities (not spec files, but positioned in the authority hierarchy):
# - Composition contract (packages/plugins/cross-model/references/composition-contract.md):
#     subordinate to this spec, authoritative for inline stub authors at implementation time.
# - Inline stubs (per participating skill): runtime authority, role-specific subset of contract.
# See foundations.md#three-layer-delivery-authority for the full hierarchy.

boundary_rules:
  - on_change_to: [capsule-contract]
    review_authorities: [pipeline, routing, lineage]
    reason: Capsule schemas are consumed by pipeline adapters, referenced by routing classification, and carry lineage identity fields.
  - on_change_to: [routing]
    review_authorities: [pipeline, lineage, delivery-plan]
    reason: Routing rules affect pipeline tautology filter design, budget enforcement depends on lineage_root_id, implementation sequence may change.
  - on_change_to: [lineage]
    review_authorities: [capsule-contract, routing, delivery-plan]
    reason: Identity keys are capsule schema fields, budget tracks by lineage_root_id, implementation depends on identity system.
  - on_change_to: [pipeline]
    review_authorities: [capsule-contract, routing, delivery-plan]
    reason: Pipeline adapters consume capsule schemas, tautology filter relates to materiality classification, skill text changes need updating.
