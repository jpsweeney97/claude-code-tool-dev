shared_contract_version: 1
readme: README.md

authorities:
  foundation:
    description: Cross-cutting architecture, design principles, resilience principle, scope boundary, topic hierarchy, and component inventory for CCDI.
    default_claims: [architecture_rule]

  data-model:
    description: Topic inventory schema (CompiledInventory, TopicRecord, Alias, QueryPlan, DenyRule, DocRef), version axes, overlay merge semantics, configuration schema, and inventory lifecycle.
    default_claims: [persistence_schema, architecture_rule]
    # NOTE: data-model.md's architecture_rule claim covers persistence-layer elaboration
    # of architectural principles owned by foundations.md, not independent architectural
    # authority. For cross-cutting architecture decisions, foundations.md governs.
    # SCOPE CONSTRAINT: data-model.md's position in claim_precedence.architecture_rule
    # ([foundation, data-model, decisions]) enables it to resolve architecture disputes
    # ahead of decisions, but only for persistence-layer elaboration. Architectural claims
    # in data-model.md that are not traceable to foundations.md are underdetermined.

  classifier-contract:
    description: Two-stage classifier pipeline (candidate generation, ambiguity resolution), confidence levels, injection thresholds, and classifier output structure.
    default_claims: [behavior_contract, interface_contract]

  registry-contract:
    description: Per-conversation topic registry state machine, state transitions, scheduling rules, semantic hints, and session-local caches.
    default_claims: [behavior_contract, interface_contract]

  packet-contract:
    description: Fact packet structure, verbatim vs paraphrase rules, token budgets, citation format, and rendered output templates.
    default_claims: [behavior_contract, interface_contract]

  integration:
    description: CLI tool interface (topic_inventory.py commands), cross-plugin dependency, data flows (CCDI-lite and full CCDI), registry seed handoff, prepare/commit protocol, inventory generation, and dump_index_metadata schema.
    default_claims: [behavior_contract, interface_contract]
    elevated_sections:
      - section: "pipeline-isolation-invariants-subset"
        claim: "behavior_contract"
        rationale: "Cross-reference pointer: these invariants originate from decisions.md. This registration provides direct visibility of the provenance relationship; it does not change authority resolution — claim_precedence already ranks integration above decisions for behavior_contract."

  delivery:
    description: Rollout strategy (Phase A/B, shadow mode, kill criteria), testing strategy (four-layer approach, ccdi_trace replay), test matrices, and per-dialogue diagnostics schema.
    default_claims: [implementation_plan, verification_strategy]

  decisions:
    description: Locked design decisions from the 7-turn design dialogue and 6-turn review dialogue with Codex.
    default_claims: [decision_record]

  supporting:
    description: README and reference material.
    default_claims: []

precedence:
  normative_first: true
  # NOTE: Section-level claim elevation — registered via `elevated_sections` on an authority
  # entry above. See integration.`elevated_sections` for the formal registration of
  # §pipeline-isolation-invariants-subset claiming behavior_contract authority above decision_record.
  # NOTE: Authorities appear in chains for claims they don't hold in
  # default_claims. Presence means "consulted for resolution," not "claims
  # this type." For example:
  # - `decisions` appears last in most chains as a fallback of last resort.
  #   Exception: decision_record chain, where decisions is first (it owns
  #   that claim).
  # - `integration` ranks first for interface_contract because it defines
  #   the external CLI interface consumed by agents.
  claim_precedence:
    architecture_rule: [foundation, data-model, decisions]
    behavior_contract: [classifier-contract, registry-contract, packet-contract, integration, decisions]
    interface_contract: [integration, classifier-contract, registry-contract, packet-contract, decisions]
    persistence_schema: [data-model, integration, decisions]  # integration included: RegistrySeed envelope and dump_index_metadata schema surface persistence concerns at the CLI interface
    decision_record: [decisions, foundation]  # delivery removed: delivery makes no decision_record claims
    implementation_plan: [delivery, integration, decisions]
    verification_strategy: [delivery, integration, decisions]
  # fallback_authority_order applies only when a claim is not covered by any defined
  # claim_precedence chain. For defined claim families, always use the specific chain
  # above — this is not a tiebreaker within defined chains.
  fallback_authority_order: [foundation, data-model, classifier-contract, registry-contract, packet-contract, integration, delivery, decisions]
  unresolved: ambiguity_finding

boundary_rules:
  - on_change_to: [data-model]
    review_authorities: [classifier-contract, registry-contract, packet-contract, integration]
    reason: Schema changes to inventory, aliases, config, or RegistrySeed durable-field subset affect all downstream consumers. Integration is included because RegistrySeed envelope and dump_index_metadata schema changes affect CLI interface contracts.
  - on_change_to: [classifier-contract]
    review_authorities: [registry-contract, integration]
    reason: Classifier output structure and confidence semantics drive registry scheduling and integration wiring.
  - on_change_to: [registry-contract]
    review_authorities: [integration, delivery, data-model]
    reason: >-
      Registry state changes and semantic hints schema affect CLI command behavior, argument shapes,
      test strategy, and RegistrySeed.entries durable-field subset. NOTE: changes to
      RegistrySeed.entries durable-field semantics (which fields are durable vs attempt-local) in
      registry.md do NOT require data-model.md review — data-model.md owns only the envelope schema
      (entries, docs_epoch, inventory_snapshot_version, results_file). Only changes to the envelope
      itself require data-model.md review. NOTE (circular dependency): boundary rules 3
      (registry-contract -> data-model) and the data-model rule (data-model -> registry-contract)
      create a bidirectional dependency for RegistrySeed.entries — changes to either file require
      reviewing the other. This is an accepted architectural trade-off of the authority split.
  - on_change_to: [integration]
    review_authorities: [registry-contract, delivery, data-model]
    reason: CLI interface changes (including semantic hint schema) affect registry scheduling logic, test strategy, and dump_index_metadata schema changes affect inventory generation (data-model).
  - on_change_to: [delivery]
    review_authorities: [integration]
    reason: graduation.json status enum changes affect the shadow mode gate algorithm in integration.md.
